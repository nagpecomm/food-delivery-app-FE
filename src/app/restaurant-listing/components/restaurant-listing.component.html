<main class="main-content my-gap">

  <!-- Search + Filter -->
  <div class="filter-bar">

    <input
      type="text"
      placeholder="Search..."
      [(ngModel)]="searchText"
      (input)="applyFilters()"
      class="search-box"
    />

    <select [(ngModel)]="sortOption" (change)="applyFilters()" class="sort-dropdown">
      <option value="">Sort</option>
      <option value="az">Name A → Z</option>
      <option value="za">Name Z → A</option>
    </select>

  </div>

  <div class="restaurant-grid">
    <div class="restaurant-card" *ngFor="let restaurant of filteredRestaurantList">

      <div class="restaurant-image">
        <img [src]="'assets/restaurant-pics/' + getRandomImage()" alt="Restaurant">
      </div>

      <div class="restaurant-details">
        <h3 class="restaurant-name">{{restaurant.name}}</h3>

        <div class="restaurant-rating">
          <span class="rating"><i class="fa fa-star"></i>4.5</span>
          <span class="rating-count">(500+)</span>
        </div>

        <button class="order-btn" (click)="onButtonClick(restaurant.id)">
          Order Now
        </button>

      </div>

    </div>
  </div>

</main>
